services:
  - type: web
    name: ai-horoscope-api
    runtime: python
    plan: starter
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    # Persistent disk so the SQLite database survives redeploys.
    disk:
      name: astraea-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: DATABASE_PATH
        value: /var/data/astrology.db
